<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0f3460;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      color: #e94560;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    #total {
      font-size: 13px;
      color: #aaa;
    }

    #total span {
      color: #fff;
      font-weight: 600;
    }

    main {
      display: flex;
      flex: 1;
    }

    /* LEFT PANEL */
    #form-panel {
      width: 300px;
      min-width: 300px;
      background: #16213e;
      padding: 24px;
      border-right: 1px solid #1a3a5c;
    }

    #form-panel h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 11px;
      color: #ccc;
      margin-bottom: 4px;
    }

    input, select, textarea {
      width: 100%;
      background: #0f1a2e;
      border: 1px solid #1a3a5c;
      border-radius: 4px;
      padding: 9px 10px;
      color: #fff;
      font-size: 13px;
      font-family: inherit;
      margin-bottom: 14px;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #e94560;
    }

    textarea { resize: vertical; min-height: 72px; }

    select option { background: #0f1a2e; }

    #submit-btn {
      width: 100%;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 11px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    #submit-btn:hover { background: #c73652; }
    #submit-btn:disabled { background: #555; cursor: not-allowed; }

    #form-error {
      color: #e94560;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    /* RIGHT PANEL */
    #list-panel {
      flex: 1;
      background: #1a1a2e;
      padding: 24px;
    }

    #list-panel h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 18px;
    }

    .expense-row {
      background: #16213e;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .expense-note {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
    }

    .expense-category {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 4px;
    }

    .expense-amount {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      margin-left: 16px;
    }

    #empty-state {
      color: #555;
      font-size: 13px;
      text-align: center;
      margin-top: 40px;
    }

    .expense-date {
      font-size: 11px;
      color: #666;
      margin-top: 3px;
    }

    /* FILTER BAR */
    #filter-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    #filter-bar select,
    #filter-bar input[type="date"] {
      background: #0f1a2e;
      border: 1px solid #1a3a5c;
      border-radius: 4px;
      padding: 7px 10px;
      color: #fff;
      font-size: 12px;
      font-family: inherit;
      margin-bottom: 0;
      width: auto;
    }

    #filter-bar select:focus,
    #filter-bar input[type="date"]:focus {
      border-color: #e94560;
    }

    #filter-clear {
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      color: #666;
      cursor: pointer;
      font-size: 12px;
      padding: 7px 10px;
      white-space: nowrap;
    }

    #filter-clear:hover {
      border-color: #aaa;
      color: #aaa;
    }

    .delete-btn, .edit-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      color: #666;
      cursor: pointer;
      font-size: 13px;
      padding: 4px 8px;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      border-color: #e94560;
      color: #e94560;
    }

    .edit-btn:hover {
      border-color: #4ecdc4;
      color: #4ecdc4;
    }

    /* MODAL */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.open {
      display: flex;
    }

    #modal {
      background: #16213e;
      border: 1px solid #1a3a5c;
      border-radius: 8px;
      padding: 24px;
      width: 340px;
      position: relative;
    }

    #modal h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 18px;
    }

    #modal-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      color: #666;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }

    #modal-close:hover { color: #fff; }

    #modal-save-btn {
      width: 100%;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 11px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    #modal-save-btn:hover { background: #c73652; }
    #modal-save-btn:disabled { background: #555; cursor: not-allowed; }

    #modal-error {
      color: #e94560;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    /* CHART */
    #chart-section {
      background: #16213e;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    #chart-section.hidden { display: none; }

    #chart-canvas-wrap {
      width: 160px;
      height: 160px;
      flex-shrink: 0;
    }

    #chart-legend {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
    }

    .legend-label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ccc;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-amount {
      color: #fff;
      font-weight: 600;
      white-space: nowrap;
    }

    .legend-pct {
      color: #666;
      font-size: 11px;
      margin-left: 4px;
    }
  </style>
</head>
<body>

  <header>
    <h1>EXPENSE TRACKER</h1>
    <div id="total">Total: <span id="total-value">Rp 0</span></div>
  </header>

  <main>
    <section id="form-panel">
      <h2>Add Expense</h2>
      <form id="expense-form">
        <label for="amount">Amount (Rp)</label>
        <input id="amount" type="number" min="0" step="any" placeholder="50000" required>

        <label for="category">Category</label>
        <select id="category" required>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Bills">Bills</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>

        <label for="note">Note</label>
        <textarea id="note" placeholder="e.g. Lunch at warung"></textarea>

        <label for="date">Date</label>
        <input id="date" type="date" required>

        <button id="submit-btn" type="submit">+ Add Expense</button>
        <div id="form-error"></div>
      </form>
    </section>

    <section id="list-panel">
      <h2>Expenses</h2>
      <div id="filter-bar">
        <select id="filter-category">
          <option value="">All Categories</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Bills">Bills</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>
        <input id="filter-from" type="date" title="From">
        <input id="filter-to" type="date" title="To">
        <button id="filter-clear">Clear</button>
      </div>
      <div id="chart-section" class="hidden">
        <div id="chart-canvas-wrap">
          <canvas id="spending-chart"></canvas>
        </div>
        <div id="chart-legend"></div>
      </div>

      <div id="expense-list"></div>
    </section>
  </main>

  <!-- EDIT MODAL -->
  <div id="modal-overlay">
    <div id="modal">
      <button id="modal-close" aria-label="Close">×</button>
      <h2>Edit Expense</h2>

      <label for="modal-amount">Amount (Rp)</label>
      <input id="modal-amount" type="number" min="0" step="any" required>

      <label for="modal-category">Category</label>
      <select id="modal-category">
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Bills">Bills</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Health">Health</option>
        <option value="Other">Other</option>
      </select>

      <label for="modal-note">Note</label>
      <textarea id="modal-note"></textarea>

      <label for="modal-date">Date</label>
      <input id="modal-date" type="date" required>

      <button id="modal-save-btn">Save Changes</button>
      <div id="modal-error"></div>
    </div>
  </div>

  <script>
    let editingId = null;
    let spendingChart = null;

    function renderChart(expenses) {
      const section = document.getElementById('chart-section');
      const legend = document.getElementById('chart-legend');

      if (expenses.length === 0) {
        section.classList.add('hidden');
        return;
      }

      const totals = {};
      for (const e of expenses) {
        totals[e.category] = (totals[e.category] || 0) + e.amount;
      }

      const categories = Object.keys(totals).sort((a, b) => totals[b] - totals[a]);
      const total = Object.values(totals).reduce((s, v) => s + v, 0);
      const colors = categories.map(c => (CATEGORY_COLORS[c] || CATEGORY_COLORS.Other).text);
      const amounts = categories.map(c => totals[c]);

      if (spendingChart) {
        spendingChart.data.labels = categories;
        spendingChart.data.datasets[0].data = amounts;
        spendingChart.data.datasets[0].backgroundColor = colors;
        spendingChart.update();
      } else {
        const ctx = document.getElementById('spending-chart').getContext('2d');
        spendingChart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: categories,
            datasets: [{
              data: amounts,
              backgroundColor: colors,
              borderWidth: 2,
              borderColor: '#16213e',
            }],
          },
          options: {
            cutout: '68%',
            plugins: { legend: { display: false }, tooltip: { enabled: false } },
            animation: { duration: 400 },
          },
        });
      }

      legend.innerHTML = categories.map(cat => {
        const color = (CATEGORY_COLORS[cat] || CATEGORY_COLORS.Other).text;
        const pct = Math.round((totals[cat] / total) * 100);
        return `
          <div class="legend-row">
            <span class="legend-label">
              <span class="legend-dot" style="background:${color}"></span>
              ${escapeHtml(cat)}
            </span>
            <span>
              <span class="legend-amount">${formatRp(totals[cat])}</span>
              <span class="legend-pct">${pct}%</span>
            </span>
          </div>
        `;
      }).join('');

      section.classList.remove('hidden');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatRp(amount) {
      return 'Rp ' + Number(amount).toLocaleString('id-ID');
    }

    const CATEGORY_COLORS = {
      Food:          { text: '#e94560', bg: '#2a1a2e' },
      Transport:     { text: '#4ecdc4', bg: '#1a2a2e' },
      Bills:         { text: '#f7b731', bg: '#2a2a1a' },
      Entertainment: { text: '#a29bfe', bg: '#1e1a2e' },
      Health:        { text: '#55efc4', bg: '#1a2e2a' },
      Other:         { text: '#aaa',    bg: '#222'    },
    };

    function openEditModal(expense) {
      editingId = expense.id;
      document.getElementById('modal-amount').value = expense.amount;
      document.getElementById('modal-category').value = expense.category;
      document.getElementById('modal-note').value = expense.note || '';
      document.getElementById('modal-date').value = expense.date || '';
      document.getElementById('modal-error').style.display = 'none';
      document.getElementById('modal-overlay').classList.add('open');
      document.getElementById('modal-amount').focus();
    }

    function closeEditModal() {
      editingId = null;
      document.getElementById('modal-overlay').classList.remove('open');
    }

    async function deleteExpense(id) {
      const res = await fetch(`/expenses/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('Delete failed: ' + res.status);
      await loadExpenses();
    }

    function renderExpenses(expenses) {
      const list = document.getElementById('expense-list');
      const totalEl = document.getElementById('total-value');

      renderChart(expenses);

      if (expenses.length === 0) {
        list.innerHTML = '<p id="empty-state">No expenses yet. Add one!</p>';
        totalEl.textContent = 'Rp 0';
        return;
      }

      const total = expenses.reduce((sum, e) => sum + e.amount, 0);
      totalEl.textContent = formatRp(total);

      list.innerHTML = expenses.map(e => {
        const colors = CATEGORY_COLORS[e.category] || CATEGORY_COLORS.Other;
        const dateStr = e.date ? new Date(e.date + 'T00:00:00').toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
        return `
          <div class="expense-row">
            <div>
              <div class="expense-note">${escapeHtml(e.note || '—')}</div>
              <span class="expense-category"
                style="color:${colors.text};background:${colors.bg}">
                ${escapeHtml(e.category)}
              </span>
              <div class="expense-date">${dateStr}</div>
            </div>
            <div style="display:flex;align-items:center">
              <div class="expense-amount">${formatRp(e.amount)}</div>
              <button class="edit-btn" data-expense='${escapeHtml(JSON.stringify(e))}'>✎</button>
              <button class="delete-btn" data-id="${e.id}">×</button>
            </div>
          </div>
        `;
      }).join('');

      list.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => openEditModal(JSON.parse(btn.dataset.expense)));
      });

      list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteExpense(Number(btn.dataset.id)));
      });
    }

    async function loadExpenses() {
      const params = new URLSearchParams();
      const cat = document.getElementById('filter-category').value;
      const from = document.getElementById('filter-from').value;
      const to = document.getElementById('filter-to').value;
      if (cat) params.set('category', cat);
      if (from) params.set('startDate', from);
      if (to) params.set('endDate', to);

      const url = params.toString() ? `/expenses?${params}` : '/expenses';
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('Server error: ' + res.status);
        const data = await res.json();
        renderExpenses(data);
      } catch (err) {
        document.getElementById('expense-list').innerHTML =
          '<p id="empty-state">Could not load expenses. Is the server running?</p>';
      }
    }

    document.getElementById('expense-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('form-error');
      errEl.style.display = 'none';
      btn.disabled = true;

      const body = {
        amount: parseFloat(document.getElementById('amount').value),
        category: document.getElementById('category').value,
        note: document.getElementById('note').value.trim(),
        date: document.getElementById('date').value,
      };

      try {
        const res = await fetch('/expenses', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error('Server error: ' + res.status);

        document.getElementById('amount').value = '';
        document.getElementById('note').value = '';
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        await loadExpenses();
      } catch (err) {
        errEl.textContent = 'Failed to add expense. Is the server running?';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById('modal-save-btn').addEventListener('click', async () => {
      if (!editingId) return;
      const btn = document.getElementById('modal-save-btn');
      const errEl = document.getElementById('modal-error');
      errEl.style.display = 'none';
      btn.disabled = true;

      const body = {
        amount: parseFloat(document.getElementById('modal-amount').value),
        category: document.getElementById('modal-category').value,
        note: document.getElementById('modal-note').value.trim(),
        date: document.getElementById('modal-date').value,
      };

      try {
        const res = await fetch(`/expenses/${editingId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error('Server error: ' + res.status);
        closeEditModal();
        await loadExpenses();
      } catch (err) {
        errEl.textContent = 'Failed to save changes.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById('modal-close').addEventListener('click', closeEditModal);

    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal-overlay')) closeEditModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeEditModal();
    });

    document.getElementById('date').value = new Date().toISOString().split('T')[0];

    document.getElementById('filter-category').addEventListener('change', loadExpenses);
    document.getElementById('filter-from').addEventListener('change', loadExpenses);
    document.getElementById('filter-to').addEventListener('change', loadExpenses);
    document.getElementById('filter-clear').addEventListener('click', () => {
      document.getElementById('filter-category').value = '';
      document.getElementById('filter-from').value = '';
      document.getElementById('filter-to').value = '';
      loadExpenses();
    });

    loadExpenses();
  </script>

</body>
</html>
